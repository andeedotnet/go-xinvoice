name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true

      - name: gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-ed:"; echo "$unformatted"; exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: build
        run: go build ./...

      - name: test
        # Require the committed testsuite instances to actually run: without this,
        # a missing/empty testdata/ would silently skip the zero-false-positives
        # and round-trip verification and CI would still go green.
        env:
          XINVOICE_REQUIRE_TESTSUITE: "1"
        run: go test -race -covermode=atomic -coverprofile=coverage.out ./...

      - name: coverage summary
        run: go tool cover -func=coverage.out | tail -1

      - name: govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

      - name: fuzz smoke
        # Short live fuzz run of the untrusted-input parsers on top of the seed
        # corpus that the normal test run already exercises. A crasher fails CI.
        run: |
          go test -run '^$' -fuzz='^FuzzParseXML$' -fuzztime=30s .
          go test -run '^$' -fuzz='^FuzzFromJSON$' -fuzztime=30s .

      - name: generated catalog is up to date
        run: |
          go generate ./...
          if ! git diff --quiet -- internal/catalog; then
            echo "internal/catalog is stale — run 'go generate ./...' and commit:"
            git --no-pager diff -- internal/catalog
            exit 1
          fi
